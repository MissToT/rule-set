name: Update Rule Sets

on:
  schedule:
    - cron: '0 20 * * *' # 每天北京时间凌晨 4 点全自动运行
  workflow_dispatch: # 支持手动点击运行

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Default Branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Compilation Script
        # 执行 scripts 目录下的 convert.py
        run: python scripts/convert.py

      - name: Deploy to mihomo Branch
        run: |
          cd mihomo_out
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated Sync: Update Mihomo MRS rules"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:mihomo

      - name: Deploy to singbox Branch
        run: |
          cd singbox_out
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated Sync: Update Sing-box SRS rules"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:singbox